<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab Master</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="dashboard" role="main">

      <!-- Search -->
      <section class="search" aria-label="Search the web">
        <div class="search-bar" role="search">
          <img src="assets/svg/search.svg" alt="" class="icon" />
          <input id="searchInput" type="text" placeholder="Search the web..." autocomplete="off" aria-label="Search" />
          <button class="mic" title="Voice search">
            <img src="assets/svg/mic.svg" alt="" />
          </button>
        </div>
      </section>

      <!-- Quick links -->
      <section class="quick-links" aria-label="Quick links">
        <button class="card action-card youtube" data-url="https://www.youtube.com/" >
        </button>
        <button class="card action-card chatgpt" data-url="https://chat.openai.com/?temporary-chat=true" >
        </button>
        <button class="card action-card spotify" data-url="https://calendar.google.com/">
        </button>
      </section>

       <!-- Dock -->
      <nav class="dock" aria-label="Dock shortcuts">

        <button class="dock-icon white" data-url="https://tasks.google.com">
          <img src="assets/img/task.png" alt="Tasks" />
        </button>

        <button class="dock-icon white" data-url="https://keep.google.com/">
           <img src="assets/img/keep.png" alt="Keep" />
        </button>

        <button class="dock-icon white" data-url="https://gmail.com/">
          <img src="assets/img/gmail.png" alt="Gmail" />
        </button>

        <button class="dock-icon white" data-url="https://mega.nz/fm/Ms4DQCIJ/">
          <img src="assets/img/mega.png" alt="Mega" />
        </button>
        
        <button class="dock-icon white" data-url="https://translate.google.lk/?sl=si&tl=en&op=translate">
          <img src="assets/img/translate.png" alt="Translate" />
        </button>

        <button class="dock-icon white" data-url="#">
          <img src="assets/img/github.png" alt="GitHub" />
        </button>

      </nav>
    </main>

    <script src="script.js"></script>
  </body>
</html>
