<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette</title>
    <style>
        body {
            font-family: sans-serif;
            background-image: url('assets/img/bg.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            overflow: hidden;

        }

        .contanier{
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.1);
            height: 100dvh;
            width: 100dvw;
            overflow: hidden;
        }

        .color-box {
            width: 100px;
            height: 100px;
            margin: 10px;
            border: 1px solid #ccc;
            display: inline-block;
            text-align: center;
            line-height: 100px;
            color: #333;
            font-weight: bold;
        }
        details {
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        summary {
            padding: 10px;
            background-color: #eee;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="contanier">
        <h1>Font Colors from style.css</h1>

    <details open>
        <summary>White-ish Colors</summary>
        <div class="color-box" style="background-color: white;">white</div>
        <div class="color-box" style="background-color: #ffffffb3;">#ffffffb3</div>
        <div class="color-box" style="background-color: #ffffffcc;">#ffffffcc</div>
        <div class="color-box" style="background-color: #ffffff4d;">#ffffff4d</div>
        <div class="color-box" style="background-color: ghostwhite;">ghostwhite</div>
        <div class="color-box" style="background-color: oldlace;">oldlace</div>
        <div class="color-box" style="background-color: linen;">linen</div>
        <div class="color-box" style="background-color: snow;">snow</div>
        <div class="color-box" style="background-color: azure;">azure</div>
        <div class="color-box" style="background-color: #f9fafb;">#f9fafb</div>
    </details>

    <details>
        <summary>Green-ish Colors</summary>
        <div class="color-box" style="background-color: #d1fae5;">#d1fae5</div>
    </details>

    <details>
        <summary>New Colors</summary>
        <div class="color-box" style="background-color: aliceblue;">aliceblue</div>
        <div class="color-box" style="background-color: floralwhite;">floralwhite</div>
        <div class="color-box" style="background-color: ivory;">ivory</div>
        <div class="color-box" style="background-color: mintcream;">mintcream</div>
        <div class="color-box" style="background-color: seashell;">seashell</div>
        <div class="color-box" style="background-color: lavenderblush;">lavenderblush</div>
    </details>
    </div>

</body>
</html>
