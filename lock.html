<!doctype html>
<html lang="en">
  <head>
    <script defer src="assets/js/lock.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Unlock Tably</title>
    <style>
      :root {
        --ui-bg-01: #1b1f37;
        --ui-bg-02: #121426;
        --ui-accent: #4a86ff;
        --ui-accent-strong: #4a86ff;
        --ui-danger: #ff8d8d;
        --ui-border: rgba(255, 255, 255, 0.24);
        --ui-border-focus: rgba(91, 154, 255, 0.92);
        --ui-text-main: #f4f7ff;
        --ui-text-sub: rgba(244, 247, 255, 0.78);
      }

      * {
        box-sizing: border-box;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      input,
      textarea,
      [contenteditable="true"] {
        -webkit-user-select: text;
        user-select: text;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background:
          radial-gradient(
            circle at 16% 18%,
            #3b4f88 0%,
            rgba(59, 79, 136, 0.08) 44%
          ),
          radial-gradient(
            circle at 85% 90%,
            #324f8f 0%,
            rgba(50, 79, 143, 0) 42%
          ),
          linear-gradient(175deg, var(--ui-bg-01), var(--ui-bg-02) 52%, #0d1020);
        color: var(--ui-text-main);
      }

      .glass-element {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow:
          0 16px 32px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
        transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3vw;
        align-items: stretch;
        justify-content: center;
        margin: 0 5vw;
        border-radius: 2rem;
      }

      .media-pane,
      .form-pane {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container img {
        width: min(100%, 620px);
        height: auto;
        border-radius: 18px;
        object-fit: cover;
        -webkit-user-drag: none;
        user-drag: none;
        pointer-events: none;
      }

      .card {
        width: min(94vw, 430px);

        border-radius: 18px;

        padding: 1.2rem;
      }

      @media (max-width: 900px) {
        .container {
          grid-template-columns: 1fr;
          gap: 2rem;
          min-height: auto;
          margin: 0;
        }

        .container img {
          width: min(100%, 480px);
        }
      }

      .brand {
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 700;
        color: rgba(242, 246, 255, 0.82);
      }

      .title {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
      }

      .sub {
        margin-bottom: 2rem;
        color: var(--ui-text-sub);
        font-size: 0.95rem;
      }

      .field {
        display: grid;
        gap: 0.45rem;
      }

      .field-label {
       display: none;
      }

      .input {
        width: 100%;
        height: 48px;
        border-radius: 0.6rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        padding: 0 0.95rem;
        outline: none;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      .input::placeholder {
        color: rgba(255, 255, 255, 0.44);
        font-weight: 500;
      }

      .input:focus {
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .input.input-error {
        border-color: rgba(255, 141, 141, 0.92);
        animation: input-shake 360ms ease;
      }

      .btn {
        margin-top: 0.95rem;
        width: 100%;
        height: 48px;
        border: 1px solid rgba(109, 164, 255, 0.78);
        border-radius: 12px;
        background: var(--ui-accent);
        color: #fff;
        font-size: 1.08rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 140ms ease,
          filter 140ms ease,
          box-shadow 140ms ease;
        box-shadow:
          0 10px 18px rgba(26, 90, 214, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }

      .btn:active {
        transform: translateY(1px) scale(0.995);
      }

      .btn:disabled {
        cursor: default;
        opacity: 0.88;
      }

      .btn-label {
        display: inline-block;
        transition:
          opacity 120ms ease,
          transform 120ms ease;
      }

      .btn-label.is-out {
        opacity: 0;
        transform: translateY(-5px);
      }

      .btn-label.is-in {
        opacity: 1;
        transform: translateY(0);
      }

      .btn.is-error {
        border-color: rgba(109, 164, 255, 0.78);
        background: var(--ui-accent);
        animation: button-shake 400ms ease;
      }

      .err {
        min-height: 1.2rem;
        margin-top: 0.75rem;
        color: var(--ui-danger);
        font-size: 0.84rem;
        line-height: 1.25;
        opacity: 0;
        transform: translateY(-4px);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      .err.show {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes button-shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-6px);
        }
        40% {
          transform: translateX(5px);
        }
        60% {
          transform: translateX(-4px);
        }
        80% {
          transform: translateX(3px);
        }
      }

      @keyframes input-shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-4px);
        }
        50% {
          transform: translateX(4px);
        }
        75% {
          transform: translateX(-3px);
        }
      }
    </style>
  </head>
  <body>
    <div class="container glass-element">
      <div class="media-pane">
        <img src="assets/img/photos/incognita.png" alt="" draggable="false" />
      </div>
      <div class="form-pane">
        <form id="lockForm" class="card" autocomplete="off">
          <div class="brand">Secure Access</div>
          <div class="title">UNLOCK BROWSER</div>
          <div class="sub">Enter your password to access your web browser.</div>
          <div class="field">
            <label for="pwd" class="field-label">Password</label>
            <input
              id="pwd"
              class="input"
              type="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
          </div>
          <button id="unlockBtn" type="submit" class="btn" aria-live="polite">
            <span id="unlockBtnLabel" class="btn-label">Continue</span>
          </button>
          <div id="err" class="err" role="alert" aria-live="assertive"></div>
        </form>
      </div>
    </div>
  </body>
</html>
